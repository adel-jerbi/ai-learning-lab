services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ai-pgvector
    environment:
      POSTGRES_USER: ai
      POSTGRES_PASSWORD: ai
      POSTGRES_DB: ai_learning
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-vector.sql:/docker-entrypoint-initdb.d/init-vector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai -d ai_learning"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata: